<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Calendar - vinay</title>
  <link rel="stylesheet" href="calendar.css">

</head>

<body class="light">

  <div class="sidebar">
    <h2>VINAY</h2>
    <span>TIWARI</span>
  </div>

  <body class="light">
    <h1 class="app-title">ᥴꪖꪶꫀꪀᦔꫀ᥅</h1>

    <div class="main-layout">

      <div class="calendar">
        <div class="calendar-header">
          <span id="month"></span>
          <div>
            <button id="prev">◀</button>
            <span id="year"></span>
            <button id="next">▶</button>
          </div>
          <button id="theme-toggle">🌙</button>
        </div>

        <div class="calendar-week-days">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>

        <div class="calendar-days"></div>

        <div class="date-time-formate">
          <div id="time"></div>
          <div id="date"></div>
        </div>
      </div>

      <!-- 👉 SIDE CARD -->
      <div class="date-card" id="date-card">
        <span class="close-btn" id="close-btn">❌</span>
        <h2 id="card-day"></h2>
        <p id="card-date"></p>
      </div>

    </div>

    <script src="calendar.js"></script>

  </body>

</html>
